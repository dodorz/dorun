name: Build

on:
  push:
    tags:
      - 'v*.*.*.*'
      - '*.*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: Optional version tag, with or without leading v
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version and release gate
        id: version
        shell: pwsh
        env:
          MANUAL_VERSION: ${{ github.event.inputs.version || '' }}
        run: |
          $rawVersion = ""
          $isRelease = "false"
          $shouldBuild = "true"
          $publishRelease = "false"
          $isManualVersionedBuild = $env:GITHUB_EVENT_NAME -eq "workflow_dispatch" -and -not [string]::IsNullOrWhiteSpace($env:MANUAL_VERSION)

          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $rawVersion = $env:GITHUB_REF_NAME
          } elseif (-not [string]::IsNullOrWhiteSpace($env:MANUAL_VERSION)) {
            $rawVersion = $env:MANUAL_VERSION
          }

          if (-not [string]::IsNullOrWhiteSpace($rawVersion)) {
            if ($rawVersion -notmatch '^v?\d+\.\d+\.\d+\.\d+$') {
              throw "Version tag must match vmajor.minor.patch.build or major.minor.patch.build: $rawVersion"
            }

            if ($rawVersion -match '^v') {
              $version = $rawVersion
            } else {
              $version = "v$rawVersion"
            }

            $currentSeries = ($version -replace '^v', '') -replace '\.\d+$', ''
            $previousTag = git tag --sort=-version:refname |
              Where-Object {
                $_ -match '^v?\d+\.\d+\.\d+\.\d+$' -and
                $_ -ne $rawVersion -and
                $_ -ne $version
              } |
              Select-Object -First 1

            if (-not $previousTag) {
              $isRelease = "true"
            } else {
              if ($previousTag -notmatch '^v') {
                $previousTag = "v$previousTag"
              }
              $previousSeries = ($previousTag -replace '^v', '') -replace '\.\d+$', ''
              if ($currentSeries -ne $previousSeries) {
                $isRelease = "true"
              } elseif (-not $isManualVersionedBuild) {
                $shouldBuild = "false"
              }
            }

            if ($env:GITHUB_REF_TYPE -eq "tag" -and $isRelease -eq "true") {
              $publishRelease = "true"
            }
            if ($isManualVersionedBuild) {
              $publishRelease = "true"
            }
          } else {
            $version = "dev-$($env:GITHUB_SHA.Substring(0, 7))"
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "is_release=$isRelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "should_build=$shouldBuild" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "publish_release=$publishRelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build static release
        if: steps.version.outputs.should_build == 'true'
        shell: cmd
        run: build.bat StaticRelease x64

      - name: Build dynamic release
        if: steps.version.outputs.should_build == 'true'
        shell: cmd
        run: build.bat Release x64

      - name: Package executables
        if: steps.version.outputs.should_build == 'true'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item build\StaticRelease\DoRun.exe "dist\DoRun-$version-windows-x64-static.exe"
          Copy-Item build\Release\DoRun.exe "dist\DoRun-$version-windows-x64.exe"
          Compress-Archive -Path dist\*.exe -DestinationPath "dist\DoRun-$version-windows-x64.zip" -Force

      - name: Upload build artifacts
        if: steps.version.outputs.should_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: DoRun-${{ steps.version.outputs.version }}-windows-x64
          path: dist/*.zip

      - name: Verify manual release tag exists
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
        shell: pwsh
        env:
          MANUAL_VERSION: ${{ github.event.inputs.version }}
        run: |
          $rawVersion = $env:MANUAL_VERSION
          $version = if ($rawVersion -match '^v') { $rawVersion } else { "v$rawVersion" }
          git rev-parse --verify "$version" *> $null
          if ($LASTEXITCODE -ne 0) {
            throw "Manual release version tag does not exist locally after checkout: $version"
          }

          git ls-remote --exit-code --tags origin "$version" *> $null
          if ($LASTEXITCODE -ne 0) {
            throw "Manual release version tag does not exist on origin: $version"
          }

      - name: Publish GitHub Release
        if: steps.version.outputs.should_build == 'true' && steps.version.outputs.publish_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: DoRun ${{ steps.version.outputs.version }}
          files: dist/*.zip

      - name: Note manual dev build
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version == ''
        shell: pwsh
        run: |
          Write-Host "Manual build ran without version input; artifact version falls back to dev-<sha>, and no GitHub Release is created."
          Write-Host "Set workflow_dispatch input 'version' to create a versioned zip and release."

      - name: Note build-only tag skip
        if: github.ref_type == 'tag' && steps.version.outputs.should_build != 'true'
        shell: pwsh
        run: |
          Write-Host "Skipped build because only the build segment changed for ${{ steps.version.outputs.version }}"
          Write-Host "Manual workflow_dispatch with a version input can still force a build if needed."
