# DoRun custom commands.
# Converted from Config.ini.
# Lookup order:
# 1. Command.conf next to DoRun.exe
# 2. %APPDATA%\\DoRun\\Command.conf
#
# Format:
# name:command_line:working_directory:show_window:priority_class
#
# Notes:
# - Original launcher item name ';' was renamed to _semicolon because leading ; is a comment in Command.conf.
# - Entries using shell redirection were wrapped with %ComSpec% /c for compatibility.

