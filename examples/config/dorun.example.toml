# DoRun config example.
# Copy this file to DoRun.toml and place it next to DoRun.exe,
# or under %APPDATA%\DoRun\DoRun.toml.

# Launcher hotkey:
# 1 = MOD_ALT
# 2 = MOD_CONTROL
# 4 = MOD_SHIFT
# 8 = MOD_WIN
HOTKEY_MODIFIERS = 1
HOTKEY_VK = 32

DIR = [
    "C:\\Windows\\System32",
    "C:\\Program Files",
    "C:\\Program Files (x86)",
    "D:\\Tools",
    "D:\\PortableApps"
]
