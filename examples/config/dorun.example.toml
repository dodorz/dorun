# DoRun config example.
# Copy this file to DoRun.toml and place it next to DoRun.exe,
# or under %APPDATA%\DoRun\DoRun.toml.

# Launcher hotkey:
# 1 = MOD_ALT
# 2 = MOD_CONTROL
# 4 = MOD_SHIFT
# 8 = MOD_WIN
HOTKEY_MODIFIERS = 1
HOTKEY_VK = 32

HISTORY_ENABLED = 1
HISTORY_DB_PATH = ""
HISTORY_RANK_SUM_LIMIT = 5000
HISTORY_DECAY_FACTOR = 0.9
HISTORY_PRUNE_BELOW = 1
HISTORY_MAX_ROWS = 5000
HISTORY_RECENCY_ENABLED = 1
HISTORY_FUZZY_ENABLED = 1

DIR = [
    "C:\\Windows\\System32",
    "C:\\Program Files",
    "C:\\Program Files (x86)"
]
