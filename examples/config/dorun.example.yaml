# DoRun config example.
# Copy this file to DoRun.yaml and place it next to DoRun.exe,
# or under %APPDATA%\DoRun\DoRun.yaml.

# Launcher hotkey:
# 1 = MOD_ALT
# 2 = MOD_CONTROL
# 4 = MOD_SHIFT
# 8 = MOD_WIN
HOTKEY_MODIFIERS: 1
HOTKEY_VK: 32

# Launcher appearance.
# `LAUNCHER_CORNER_RADIUS` uses pixels after DPI scaling. Set to 0 to disable rounded corners.
# `LAUNCHER_OPACITY` uses the Win32 alpha range 32-255. Set to 255 for a fully opaque window.
LAUNCHER_CORNER_RADIUS: 18
LAUNCHER_OPACITY: 245

# Optional editor command used by `/config` and `/cmdconfig`.
# This can be an executable path or a command line with arguments.
# In Command.conf you can reference it as `${EDITOR}`.
EDITOR: ''

HISTORY_ENABLED: 1
HISTORY_DB_PATH: ''
HISTORY_RANK_SUM_LIMIT: 5000
HISTORY_DECAY_FACTOR: 0.9
HISTORY_PRUNE_BELOW: 1
HISTORY_MAX_ROWS: 5000
HISTORY_RECENCY_ENABLED: 1
HISTORY_FUZZY_ENABLED: 1

# Global defaults for directory indexing.
INDEX_INCLUDE_PATHEXT: true
INDEX_RECURSIVE: true
INDEX_EXTENSIONS:
  - '.exe'
  - '.lnk'

# Each indexed directory is defined once and can override the globals above.
DIR:
  - PATH: 'C:\Windows\System32'
    INDEX_RECURSIVE: false

  - PATH: 'C:\Program Files'
    INDEX_INCLUDE_PATHEXT: false
    INDEX_EXTENSIONS:
      - '.exe'
      - '.lnk'
      - '.cmd'

  - PATH: 'C:\Program Files (x86)'
