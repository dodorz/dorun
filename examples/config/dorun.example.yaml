# DoRun config example.
# Copy this file to DoRun.yaml and place it next to DoRun.exe,
# or under %APPDATA%\DoRun\DoRun.yaml.

# Launcher hotkey:
# 1 = MOD_ALT
# 2 = MOD_CONTROL
# 4 = MOD_SHIFT
# 8 = MOD_WIN
HOTKEY_MODIFIERS: 1
HOTKEY_VK: 32
HOTKEY_DEBUG_LOG: false

# Launcher appearance.
# `LAUNCHER_CORNER_RADIUS` uses pixels after DPI scaling. Set to 0 to disable rounded corners.
# `LAUNCHER_OPACITY` uses the Win32 alpha range 32-255. Set to 255 for a fully opaque window.
# `LAUNCHER_VISIBLE_ITEM_COUNT` controls how many result rows are visible without scrolling.
# `LAUNCHER_SEARCH_FONT_FAMILY` and `LAUNCHER_RESULT_FONT_FAMILY` override the font face. Leave empty to follow the system default.
# `LAUNCHER_SEARCH_FONT_SIZE` and `LAUNCHER_RESULT_FONT_SIZE` use point sizes. Set to 0 to follow the system default.
LAUNCHER_CORNER_RADIUS: 18
LAUNCHER_OPACITY: 245
LAUNCHER_VISIBLE_ITEM_COUNT: 8
LAUNCHER_SEARCH_FONT_FAMILY: ''
LAUNCHER_RESULT_FONT_FAMILY: ''
LAUNCHER_SEARCH_FONT_SIZE: 0
LAUNCHER_RESULT_FONT_SIZE: 0

# Optional variables that Command.conf can reference as `${NAME}`.
# Define new variables under `VARS` to avoid conflicts with DoRun settings.
# For compatibility, old top-level scalar variables still work, but `VARS` wins.
# `EDITOR` is used by `/config` and `/cmdconfig`.
# `VIEWER` is used by `/view`. When empty, falls back to `EDITOR` then Shell.
# `VIEWER` can reference `${EDITOR}`, e.g.: '${EDITOR} --view'
# Runtime variables `${CMD}`, `${CWD}`, and `${CWD_FLAG}` expand at launch time:
#   - `${CMD}`       → the item's command line (useful in wrapper templates)
#   - `${CWD}`       → the item's working directory
#   - `${CWD_FLAG}`  → the directory argument for the terminal (use in Command.conf templates)
# Define `${CWD_FLAG}` here in VARS; it can reference `${CWD}` which stays as a runtime literal.
VARS:
  EDITOR: ''
  VIEWER: ''
  TERMINAL: 'wt.exe'
  CWD_FLAG: '-d "${CWD}"'

HISTORY_ENABLED: 1
HISTORY_DB_PATH: ''
HISTORY_RANK_SUM_LIMIT: 5000
HISTORY_DECAY_FACTOR: 0.9
HISTORY_PRUNE_BELOW: 1
HISTORY_MAX_ROWS: 5000
HISTORY_RECENCY_ENABLED: 1
HISTORY_FUZZY_ENABLED: 1

# Global defaults for directory indexing.
INDEX_INCLUDE_PATHEXT: true
INDEX_RECURSIVE: true
INDEX_EXTENSIONS:
  - '.exe'
  - '.lnk'

# Each indexed directory is defined once and can override the globals above.
DIR:
  - PATH: 'C:\Windows\System32'
    INDEX_RECURSIVE: false

  - PATH: 'C:\Program Files'
    INDEX_INCLUDE_PATHEXT: false
    INDEX_EXTENSIONS:
      - '.exe'
      - '.lnk'
      - '.cmd'
    # Exclude subdirectories from this PATH. Relative entries are resolved under PATH.
    INDEX_EXCLUDE_DIRS:
      - 'WindowsApps'
      - 'Common Files'

  - PATH: 'C:\Program Files (x86)'
