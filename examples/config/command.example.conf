# Format:
# name:command_line:working_directory:show_window:priority_class
# Copy this file to Command.conf and place it next to DoRun.exe,
# or under %APPDATA%\DoRun\Command.conf.
# Pass `/startup` (or `--startup`) to DoRun.exe to run the `STARTUP{...}` block.
# Escape leading `;` / `#` or a literal `:` in fields with `\`.
# Environment variables like %SystemRoot% and %SCOOP% are expanded at launch time.
# Config variables like ${EDITOR} and ${TERMINAL} are expanded from DoRun.yaml.
# Unquoted executable paths with arguments are supported when the executable path itself has no spaces.
# Multi-line batch commands are supported with `name::...:{` and a closing `}` on its own line.
# The trailing `{` may be attached to the last field, e.g. `name:::0{`.
# Startup commands are supported with `STARTUP{...}`.
# Each line inside the block uses `command_line:working_directory:show_window:priority_class`.
# Scheduled commands are supported with `CRON{...}`.
# Each line inside the block uses `<Minute> <Hour> <Day> <Month> <Weekday> <command>`.
# The `<command>` tail uses the same `command_line:working_directory:show_window:priority_class` syntax.
# `STARTUP` and `CRON` entries can also use a trailing named property block:
#   command_line {
#     working_directory: C:\Tool
#     show_window: 1
#     priority_class: 128
#     on_running: launch
#   }
# A block command can also reuse a defined command name directly:
#   AutoHotkey
# `on_running` controls what a scheduled task does when its previous process is still running:
#   launch  = start another process normally
#   skip    = do not start a new process
#   restart = terminate the previous process, then start a new one
#   queue   = wait for the previous process to exit, then start queued runs
# For `<Weekday>`, `0` and `7` both mean Sunday.
# `0/1` in a field means "start at 0, then every 1 unit".
# Example:
# update_cache:::0{
# echo hello
# dir /b
# }
#
# show_window:
#   0 = SW_HIDE
#   1 = SW_SHOWNORMAL
#   3 = SW_MAXIMIZE
#   7 = SW_SHOWMINNOACTIVE
#
# priority_class:
#   32 = NORMAL_PRIORITY_CLASS
#   64 = IDLE_PRIORITY_CLASS
#   128 = HIGH_PRIORITY_CLASS

STARTUP{
notepad.exe
"C:\Tool\Notepad3.exe":"C:\Tool":1:128
AutoHotkey
explorer.exe shell:AppsFolder\windows.immersivecontrolpanel_cw5n1h2txyewy!microsoft.windows.immersivecontrolpanel {
  show_window: 1
  priority_class: 32
}
}

CRON{
*/5 * * * * notepad.exe
0 9 * * 1-5 "C:\Tool\Notepad3.exe":"C:\Tool":1:128
0 */2 * * * AutoHotkey
0/1 * * * * messagebox {
  working_directory: C:\Tool
  show_window: 1
  priority_class: 32
  on_running: queue
}
}

notepad:notepad.exe
\;:"C:\Tool\Notepad3.exe"
notepad_utf8:C:\~\Tools\Notepad3.exe /utf8
sysroot:%SystemRoot%\System32\notepad.exe
cmd:"cmd.exe /k"
clink:"cmd.exe /s /k C:/Tool/Scoop/apps/clink/current/clink_x64.exe inject --quiet"
calc:"C:\Program Files\Calculator\calc.exe"::1:32
wt:"C:\Program Files\WindowsApps\Microsoft.WindowsTerminal_8wekyb3d8bbwe\wt.exe":"C:\Users\Public":1:32
editor:"D:\Tools\Notepad3\Notepad3.exe":"D:\Tools\Notepad3":1:128
AutoHotkey:%SCOOP%\apps\AutoHotkey\current\UX\AutoHotkeyUX.exe %USERPROFILE%\Tools\Script\AutoHotkey.ahk
config_editor:${EDITOR}
terminal:${TERMINAL}
